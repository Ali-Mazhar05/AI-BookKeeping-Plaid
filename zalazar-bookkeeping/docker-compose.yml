version: '3.8'

services:
  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      - db

  worker:
    build: ./services/worker
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-zalazar_db}
    ports:
      - "5432:5432"
