name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .
        
    - name: Lint with ruff
      run: ruff check .
      
    - name: Type check with mypy
      run: mypy src
      
    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:src
        pytest tests
      env:
        # Mock env vars for CI
        SUPABASE_URL: "http://localhost:54321"
        SUPABASE_KEY: "mock-key"
        DATABASE_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
        PLAID_CLIENT_ID: "mock"
        PLAID_SECRET_SANDBOX: "mock"
        PLAID_TOKEN_FERNET_KEY: "Xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx="
        RC_CLIENT_ID: "mock"
        RC_CLIENT_SECRET: "mock"
        RC_JWT: "mock"
        RC_FROM_NUMBER: "+10000000000"
        SMS_RECIPIENT: "+10000000000"
        EMAIL_RECIPIENT: "test@example.com"
        GMAIL_CLIENT_ID: "mock"
        GMAIL_CLIENT_SECRET: "mock"
        GMAIL_REFRESH_TOKEN: "mock"
        GEMINI_API_KEY: "mock"
